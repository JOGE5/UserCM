version: '3.8'

networks:
  campus-market-net:
    driver: bridge

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: campus_market_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../storage:/var/www/html/storage
      - ../bootstrap/cache:/var/www/html/bootstrap/cache
    env_file:
      - .env.production
    networks:
      - campus-market-net

  nginx:
    image: nginx:alpine
    container_name: campus_market_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ..:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - campus-market-net

  db:
    image: mysql:8.0
    container_name: campus_market_db
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-campus_market}
      MYSQL_USER: ${DB_USERNAME:-campus}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - campus-market-net

volumes:
  db-data:
