services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_REVERB_APP_KEY: campus-market-key
        VITE_REVERB_HOST: campus-market.lat
        VITE_REVERB_PORT: 443
        VITE_REVERB_SCHEME: https
        VITE_APP_NAME: "Campus Market"
    image: campus_app:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage
      - app_public:/var/www/html/public
    depends_on:
      - mysql
    networks:
      - campus_market_net

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: campus_nginx:latest
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - app_public:/var/www/html/public
      - storage_data:/var/www/html/storage/app/public
    depends_on:
      - app
    networks:
      - campus_market_net

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - campus_market_net
    command: --default-authentication-plugin=mysql_native_password

networks:
  campus_market_net:
    driver: bridge

volumes:
  mysql_data:
  storage_data:
  app_public: