services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: campus_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    networks:
      - campus_market_net
    entrypoint: ["/var/www/html/docker/entrypoint.sh"]
    command: ["php-fpm"]
    env_file:
      - .env.docker

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - campus_market_net

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: campus_market
      MYSQL_USER: campus_user
      MYSQL_PASSWORD: campus_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - campus_market_net
    command: --default-authentication-plugin=mysql_native_password

  node:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    image: campus_node
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - campus_market_net

networks:
  campus_market_net:
    driver: bridge

volumes:
  mysql_data:
